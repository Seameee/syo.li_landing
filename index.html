<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="syo.li - 灵感来自 BanG Dream! It's MyGO!!!!! 中的 Soyorin">
    <title>syo.li</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <!-- 主要内容区域 -->
        <div class="main-content">
            <!-- Soyorin 图片区域 -->
            <div class="image-container">
                <!-- 将下方 src 替换为你的图床链接 -->
                <img src="https://storage.moegirl.org.cn/moegirl/commons/c/c2/BanG_Dream%21_It%27s_MyGO%21%21%21%21%21_10163704.jpg" alt="Soyorin" class="soyorin-image">
            </div>
            
            <!-- 名台词区域 + 惊喜气泡 -->
            <div class="quote-wrapper">
            <button class="surprise-btn" id="surpriseBtn" aria-label="点击查看更多">
                <img src="https://storage.moegirl.org.cn/moegirl/commons/3/30/Nagasaki_Soyo_icon.png" 
                     alt="Soyorin" 
                     class="surprise-avatar">
            </button>
            
            <div class="quote-container" id="quoteContainer">
                <a href="https://mzh.moegirl.org.cn/%E9%95%BF%E5%B4%8E%E7%88%BD%E4%B8%96" 
                   target="_blank" 
                   rel="noopener noreferrer" 
                   class="quote-link"
                   title="点击访问萌娘百科 - 长崎素世">
                    <span class="quote-mark">「</span>
                    <span class="quote-text">既然这样，就由我来结束掉！</span>
                    <span class="quote-mark">」</span>
                </a>
            </div>
            
            <!-- 展开的对话框 -->
            <div class="quote-box" id="quoteBox">
                <img src="https://storage.moegirl.org.cn/moegirl/commons/3/30/Nagasaki_Soyo_icon.png" 
                     alt="Soyorin" 
                     class="quote-avatar hidden-avatar">
                <div class="quote-bubble">
                    <span class="quote-name">爽世</span>
                    <div class="quote-content">
                        为什么要演奏《<a href="https://mzh.moegirl.org.cn/%E6%98%A5%E6%97%A5%E5%BD%B1" 
                           target="_blank" 
                           rel="noopener noreferrer"
                           class="quote-song">春日影</a>》？！！
                    </div>
                </div>
            </div>
            </div>
        </div>
        
        <!-- 联系方式区域 -->
        <footer class="footer">
            <a href="https://t.me/Ayanottbot" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="contact-link">
                Telegram: @Ayanottbot
            </a>
        </footer>
        
        <!-- Moe Counter 计数器 -->
        <div class="counter">
            <img src="https://count.getloli.com/@syo.li.count?name=syo.li.count&theme=booru-lewd&padding=7&offset=0&align=center&scale=1&pixelated=1&darkmode=auto" 
                 alt="Moe Counter" 
                 class="counter-img">
        </div>
    </main>
    
    <script>
        var btn = document.getElementById('surpriseBtn');
        var quoteBox = document.getElementById('quoteBox');
        var quoteContainer = document.getElementById('quoteContainer');
        var isVisible = false;
        
        btn.addEventListener('click', function() {
            if (!isVisible) {
                // 显示对话框
                quoteContainer.style.opacity = '0';
                quoteBox.classList.add('visible');
                isVisible = true;
            } else {
                // 隐藏对话框
                quoteBox.classList.remove('visible');
                quoteContainer.style.opacity = '1';
                isVisible = false;
            }
        });
        
        // 点击对话框也可以收起
        quoteBox.addEventListener('click', function(e) {
            // 阻止点击链接时的收起行为
            if (e.target.tagName === 'A') return;
            
            if (isVisible) {
                quoteBox.classList.remove('visible');
                quoteContainer.style.opacity = '1';
                isVisible = false;
            }
        });
    </script>
</body>
</html>
